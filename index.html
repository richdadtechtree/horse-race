<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏇 두근두근 말달리기 대회</title>
<style>
  /* ============================================================
     [디자인 토큰] 경마장 컨셉 색상 정의
     - 하늘/잔디/흙 트랙의 실제 경마장 색감을 CSS 변수로 관리
     ============================================================ */
  :root {
    --sky-top: #7ec8e3;      /* 하늘 위쪽 */
    --sky-bottom: #cdeffd;   /* 하늘 아래쪽(지평선) */
    --turf: #4a9e4f;         /* 잔디 */
    --turf-dark: #3d8a42;    /* 잔디 줄무늬 */
    --dirt: #c9a06a;         /* 흙 트랙 */
    --dirt-line: #b58a52;    /* 레인 구분선 */
    --board: #1e2a1f;        /* 전광판(짙은 녹색-검정) */
    --board-text: #ffd54a;   /* 전광판 노란 글씨 */
    --accent: #e53935;       /* 포인트 빨강(결승선, 버튼) */
    --white: #fffdf7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom) 40%, var(--turf) 40%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 40px;
    overflow-x: hidden;
  }

  /* ============ 상단 타이틀 (경마장 전광판 스타일) ============ */
  .title-board {
    background: var(--board);
    color: var(--board-text);
    padding: 14px 32px;
    border-radius: 12px;
    border: 4px solid #3a4d3b;
    box-shadow: 0 6px 0 #14351c, 0 10px 24px rgba(0,0,0,.3);
    text-align: center;
    margin-bottom: 18px;
  }
  .title-board h1 {
    font-size: clamp(20px, 4vw, 32px);
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255,213,74,.6);
  }
  .title-board .sub {
    font-size: 12px;
    color: #a8e6a3;
    margin-top: 4px;
    letter-spacing: 4px;
  }

  /* ============ 설정 패널 (참여자 수 선택) ============ */
  .setup {
    background: var(--white);
    border-radius: 16px;
    padding: 22px 26px;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  .setup h2 { font-size: 18px; margin-bottom: 14px; color: #333; }
  .count-btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .count-btns button {
    padding: 12px 0;
    font-size: 18px;
    font-weight: 700;
    border: 3px solid #ddd;
    border-radius: 10px;
    background: #fafafa;
    cursor: pointer;
    transition: all .15s;
  }
  .count-btns button:hover { border-color: var(--accent); transform: translateY(-2px); }
  .count-btns button.selected {
    background: var(--accent);
    color: #fff;
    border-color: #b71c1c;
    box-shadow: 0 4px 0 #b71c1c;
  }
  .start-btn {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    background: linear-gradient(to bottom, #ff5252, var(--accent));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 5px 0 #b71c1c;
    transition: transform .1s;
  }
  .start-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #b71c1c; }
  .start-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ============ 실시간 중계석 ============ */
  .commentary {
    background: var(--board);
    color: #fff;
    border-radius: 10px;
    padding: 10px 18px;
    margin: 14px 0;
    max-width: 900px;
    width: 100%;
    min-height: 46px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: clamp(13px, 2.5vw, 16px);
    font-weight: 600;
    border: 3px solid #3a4d3b;
  }
  .commentary .mic { font-size: 20px; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { transform: scale(1.2); } }
  .commentary .text { color: #fff8dc; }

  /* ============ 경기장 (트랙) ============ */
  .track-wrap {
    display: none;
    width: 100%;
    max-width: 900px;
    background: var(--turf);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,.3);
    position: relative;
  }
  .track {
    position: relative;
    background: repeating-linear-gradient(
      to bottom,
      var(--dirt) 0px, var(--dirt) 64px,
      var(--dirt-line) 64px, var(--dirt-line) 66px
    );
    border-radius: 10px;
    overflow: hidden;
    border: 3px solid #8a6a3e;
  }
  /* 출발선 / 결승선 */
  .track::before, .track::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 8px;
    z-index: 2;
  }
  .track::before { left: 60px; background: repeating-linear-gradient(to bottom, #fff 0 8px, #333 8px 16px); }
  .track::after {
    right: 54px;
    background: repeating-linear-gradient(to bottom, #fff 0 8px, var(--accent) 8px 16px);
    animation: finishGlow 1s infinite alternate;
  }
  @keyframes finishGlow { to { box-shadow: 0 0 14px rgba(229,57,53,.9); } }

  /* ============ 레인 & 말 ============ */
  .lane {
    position: relative;
    height: 66px;
  }
  .horse {
    position: absolute;
    left: 0;
    top: 6px;
    display: flex;
    align-items: center;
    transition: none;
    z-index: 3;
    will-change: transform;
  }
  .horse .emoji {
    font-size: 38px;
    transform: scaleX(-1);           /* 🏇 이모지가 왼쪽을 보므로 좌우 반전해 오른쪽으로 달리게 함 */
    display: inline-block;
    filter: drop-shadow(2px 3px 2px rgba(0,0,0,.3));
  }
  /* 달리는 동안 위아래로 통통 튀는 갤럽 애니메이션 */
  .horse.running .emoji { animation: gallop .28s infinite; }
  @keyframes gallop {
    0%,100% { transform: scaleX(-1) translateY(0) rotate(0deg); }
    50%     { transform: scaleX(-1) translateY(-6px) rotate(-4deg); }
  }
  /* 넘어짐: 말이 뒤집히고 어지러움 표시 */
  .horse.fallen .emoji {
    animation: none;
    transform: scaleX(-1) rotate(95deg) translateY(6px);
    filter: grayscale(.4) drop-shadow(2px 3px 2px rgba(0,0,0,.3));
  }
  .horse .dizzy {
    display: none;
    position: absolute;
    top: -14px; left: 8px;
    font-size: 18px;
    animation: spinStar 1s linear infinite;
  }
  .horse.fallen .dizzy { display: block; }
  @keyframes spinStar { to { transform: rotate(360deg); } }
  /* 스퍼트: 불꽃 이펙트 */
  .horse .fire {
    display: none;
    position: absolute;
    left: -18px; top: 12px;
    font-size: 20px;
    animation: flicker .2s infinite alternate;
  }
  .horse.spurt .fire { display: block; }
  .horse.spurt .emoji { animation-duration: .16s; } /* 스퍼트 시 더 빠르게 발구름 */
  @keyframes flicker { to { transform: scale(1.3); opacity: .7; } }
  /* 흙먼지 파티클 */
  .dust {
    position: absolute;
    font-size: 13px;
    opacity: .8;
    animation: dustFade .6s forwards;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes dustFade {
    to { transform: translate(-24px, -10px) scale(1.6); opacity: 0; }
  }

  .horse .name-tag {
    position: absolute;
    top: 42px; left: 4px;
    background: rgba(0,0,0,.65);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .horse .rank-badge {
    position: absolute;
    top: -12px; left: 14px;
    font-size: 15px;
    font-weight: 900;
    display: none;
  }

  /* ============ 카운트다운 오버레이 ============ */
  .countdown {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,0,0,.6);
    background: rgba(0,0,0,.35);
    z-index: 10;
    border-radius: 16px;
  }

  /* ============ 결과(시상대) 오버레이 ============ */
  .result {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .result-card {
    background: var(--white);
    border-radius: 20px;
    padding: 28px 30px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    animation: popIn .4s cubic-bezier(.2,1.4,.4,1);
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes popIn { from { transform: scale(.6); opacity: 0; } }
  .result-card h2 { font-size: 26px; margin-bottom: 6px; }
  .winner-line { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 16px; }
  .podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 18px;
  }
  .podium .step {
    width: 88px;
    border-radius: 8px 8px 0 0;
    color: #fff;
    font-weight: 800;
    padding-top: 6px;
    position: relative;
  }
  .podium .step .h-emoji { font-size: 30px; position: absolute; top: -36px; left: 50%; transform: translateX(-50%) scaleX(-1); }
  .podium .step .h-name { font-size: 11px; display: block; margin-top: 2px; padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .step.first  { height: 92px; background: linear-gradient(#ffd54a,#f9a825); }
  .step.second { height: 68px; background: linear-gradient(#cfd8dc,#90a4ae); }
  .step.third  { height: 52px; background: linear-gradient(#d7a173,#a1663c); }
  .rank-list { text-align: left; font-size: 14px; margin-bottom: 18px; }
  .rank-list div { padding: 5px 10px; border-bottom: 1px dashed #ddd; display: flex; justify-content: space-between; }
  .result-btns { display: flex; gap: 10px; }
  .result-btns button {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  .btn-again { background: var(--accent); color: #fff; box-shadow: 0 4px 0 #b71c1c; }
  .btn-new { background: #eee; color: #333; box-shadow: 0 4px 0 #bbb; }

  /* 색종이(콘페티) */
  .confetti {
    position: fixed;
    top: -20px;
    font-size: 18px;
    z-index: 101;
    animation: fall linear forwards;
    pointer-events: none;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* 모바일 대응: 화면이 좁아도 말과 트랙이 잘 보이도록 축소 */
  @media (max-width: 520px) {
    .horse .emoji { font-size: 30px; }
    .lane { height: 56px; }
    .track { background-size: 100% 56px; }
    .track::before { left: 40px; }
    .track::after { right: 40px; }
    .horse .name-tag { top: 34px; font-size: 10px; }
  }
  /* 움직임 최소화 설정 사용자를 위한 배려 */
  @media (prefers-reduced-motion: reduce) {
    .horse.running .emoji, .commentary .mic { animation: none; }
  }
</style>
</head>
<body>

  <!-- 전광판 타이틀 -->
  <div class="title-board">
    <h1>🏇 두근두근 말달리기 대회 🏆</h1>
    <div class="sub">GRAND DERBY CHAMPIONSHIP</div>
  </div>

  <!-- 1단계: 참여자 수 설정 -->
  <div class="setup" id="setup">
    <h2>출전할 말의 수를 골라주세요!</h2>
    <div class="count-btns" id="countBtns"></div>
    <button class="start-btn" id="startBtn" disabled>🚩 레이스 시작!</button>
  </div>

  <!-- 실시간 중계석 -->
  <div class="commentary" id="commentary">
    <span class="mic">🎙️</span>
    <span class="text" id="commentText">중계를 준비 중입니다...</span>
  </div>

  <!-- 경기장 -->
  <div class="track-wrap" id="trackWrap">
    <div class="track" id="track"></div>
    <div class="countdown" id="countdown">3</div>
  </div>

  <!-- 결과 화면 -->
  <div class="result" id="result">
    <div class="result-card">
      <h2>🏁 경기 종료!</h2>
      <div class="winner-line" id="winnerLine"></div>
      <div class="podium" id="podium"></div>
      <div class="rank-list" id="rankList"></div>
      <div class="result-btns">
        <button class="btn-again" id="againBtn">🔄 같은 멤버로 재대결</button>
        <button class="btn-new" id="newBtn">⚙️ 처음부터</button>
      </div>
    </div>
  </div>

<script>
/* ==================================================================
   [게임 전체 구조 안내 - 초보자용 설명]
   1. 설정 화면에서 말의 수(2~8)를 고르고 시작
   2. 3-2-1 카운트다운 후 requestAnimationFrame으로 매 프레임 말 이동
   3. 매 프레임마다 각 말의 속도가 랜덤하게 흔들리고,
      낮은 확률로 "넘어짐"(잠시 멈춤) / "스퍼트"(속도 부스트) 이벤트 발생
   4. 결승선 통과 순서를 기록해 시상대와 순위표 표시
   ================================================================== */

// ---------- 게임에 등장할 말 이름/색상 풀 ----------
const HORSE_NAMES = ['천둥번개','바람돌이','불꽃질주','은하수','황금발굽','폭풍우','새벽별','무쇠다리'];
const BADGE_COLORS = ['#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1','#f06292','#6d4c41'];

// ---------- 중계 멘트 모음 ----------
const COMMENTS = {
  start: ['출발했습니다! 힘차게 뛰어나갑니다!','땅! 총성과 함께 레이스 시작!'],
  lead: n => [`${n}, 선두로 치고 나갑니다!`, `현재 선두는 ${n}! 엄청난 스피드!`, `${n}가 앞서 나가고 있습니다!`],
  fall: n => [`아이고!! ${n}, 넘어졌습니다!! 이럴 수가!`, `${n} 선수 낙마!! 대형 사고입니다!`, `${n}가 발이 꼬였습니다! 큰일이에요!`],
  recover: n => [`${n}, 다시 일어나 달립니다! 대단한 근성!`, `${n} 재정비 완료! 추격 시작!`],
  spurt: n => [`${n}, 무서운 스퍼트!! 불이 붙었습니다!`, `${n}의 폭발적인 가속!! 놀랍습니다!`],
  close: ['막상막하! 한 치 앞을 알 수 없습니다!','접전입니다! 손에 땀을 쥐게 하는군요!'],
  finish: n => [`${n}, 결승선 통과!! 우승입니다!!! 🎉`]
};
const pick = arr => arr[Math.floor(Math.random() * arr.length)]; // 배열에서 랜덤 하나 뽑기

// ---------- 상태 변수 ----------
let horseCount = 0;      // 선택된 말 수
let horses = [];         // 각 말의 상태 객체 배열
let raceRunning = false; // 레이스 진행 중 여부
let finishOrder = [];    // 결승선 통과 순서
let lastTime = 0;        // 프레임 간 시간 계산용
let commentLock = 0;     // 중계 멘트가 너무 자주 바뀌지 않게 하는 잠금 시간

// ---------- DOM 참조 ----------
const $ = id => document.getElementById(id);
const setupEl = $('setup'), trackEl = $('track'), trackWrap = $('trackWrap');
const commentaryEl = $('commentary'), commentText = $('commentText');
const countdownEl = $('countdown'), resultEl = $('result');

// ---------- 효과음 (Web Audio API로 간단한 비프음 생성) ----------
// 외부 파일 없이 브라우저 자체 기능으로 소리를 만듭니다.
let audioCtx = null;
function beep(freq, dur, type='square', vol=0.15) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) { /* 소리 재생 실패해도 게임은 계속 */ }
}

// ================== 1. 설정 화면 만들기 ==================
const countBtnsEl = $('countBtns');
for (let n = 2; n <= 8; n++) {
  const btn = document.createElement('button');
  btn.textContent = n + '마리';
  btn.onclick = () => {
    horseCount = n;
    document.querySelectorAll('.count-btns button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    $('startBtn').disabled = false;
    beep(600, .08, 'sine');
  };
  countBtnsEl.appendChild(btn);
}

$('startBtn').onclick = () => { setupRace(); };

// ================== 2. 레이스 준비 ==================
function setupRace() {
  setupEl.style.display = 'none';
  trackWrap.style.display = 'block';
  commentaryEl.style.display = 'flex';
  resultEl.style.display = 'none';
  trackEl.innerHTML = '';
  finishOrder = [];
  horses = [];

  const isMobile = window.innerWidth <= 520;
  const laneH = isMobile ? 56 : 66;
  trackEl.style.height = (horseCount * laneH) + 'px';

  // 말 객체 생성: 진행도(progress)는 0~1, 1이 되면 결승선 통과
  for (let i = 0; i < horseCount; i++) {
    const lane = document.createElement('div');
    lane.className = 'lane';
    const el = document.createElement('div');
    el.className = 'horse';
    el.innerHTML = `
      <span class="rank-badge"></span>
      <span class="fire">🔥</span>
      <span class="dizzy">💫</span>
      <span class="emoji">🏇</span>
      <span class="name-tag" style="border-left:4px solid ${BADGE_COLORS[i]}">${i+1}. ${HORSE_NAMES[i]}</span>`;
    lane.appendChild(el);
    trackEl.appendChild(lane);

    horses.push({
      idx: i,
      name: HORSE_NAMES[i],
      el,
      progress: 0,                          // 현재 위치 (0=출발선, 1=결승선)
      baseSpeed: 0.055 + Math.random()*0.01, // 초당 기본 진행 속도 (개체차 부여)
      state: 'ready',                        // ready | run | fallen | finished
      stateTimer: 0,                         // 넘어짐/스퍼트 지속시간 타이머
      spurt: false,
      dustTimer: 0                           // 흙먼지 생성 주기
    });
  }
  runCountdown();
}

// ================== 3. 카운트다운 (3-2-1-출발!) ==================
function runCountdown() {
  countdownEl.style.display = 'flex';
  let n = 3;
  countdownEl.textContent = n;
  beep(440, .15);
  const iv = setInterval(() => {
    n--;
    if (n > 0) {
      countdownEl.textContent = n;
      beep(440, .15);
    } else {
      clearInterval(iv);
      countdownEl.textContent = '출발!!';
      beep(880, .5, 'sawtooth', .2); // 출발 신호음(높은 음)
      setTimeout(() => {
        countdownEl.style.display = 'none';
        startRace();
      }, 600);
    }
  }, 900);
}

// ================== 4. 레이스 본편 ==================
function startRace() {
  raceRunning = true;
  lastTime = performance.now();
  horses.forEach(h => { h.state = 'run'; h.el.classList.add('running'); });
  say(pick(COMMENTS.start));
  requestAnimationFrame(loop);
}

// 매 프레임 실행되는 핵심 루프
function loop(now) {
  if (!raceRunning) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05); // 프레임 간 경과 시간(초). 탭 전환 등으로 튀는 것 방지 위해 상한 설정
  lastTime = now;
  commentLock -= dt;

  const trackW = trackEl.clientWidth;
  const isMobile = window.innerWidth <= 520;
  const startX = isMobile ? 40 : 60;
  const finishX = trackW - (isMobile ? 80 : 100); // 말 크기를 고려한 결승 지점

  horses.forEach(h => {
    if (h.state === 'finished') return;

    // --- 넘어진 상태: 타이머가 끝나면 다시 일어남 ---
    if (h.state === 'fallen') {
      h.stateTimer -= dt;
      if (h.stateTimer <= 0) {
        h.state = 'run';
        h.el.classList.remove('fallen');
        h.el.classList.add('running');
        say(pick(COMMENTS.recover(h.name)), 1.5);
      }
    }

    if (h.state === 'run') {
      // --- 랜덤 이벤트 판정 (확률은 초당 기준으로 dt를 곱해 프레임 독립적으로 계산) ---
      // 넘어짐: 초당 약 7% 확률 (0.07 * dt로 프레임 속도와 무관하게 일정한 확률 유지)
      // 단, 결승 직전(진행도 95% 이후)엔 넘어지지 않게 해서 허무한 결말을 방지합니다
      if (h.progress < 0.95 && Math.random() < 0.07 * dt) {
        h.state = 'fallen';
        h.stateTimer = 0.8 + Math.random() * 1.2; // 0.8~2초간 기절
        h.spurt = false;
        h.el.classList.remove('running','spurt');
        h.el.classList.add('fallen');
        beep(150, .3, 'sawtooth', .2); // 쿵! 소리
        say(pick(COMMENTS.fall(h.name)), 2);
      }
      // 스퍼트: 초당 약 6% 확률로 1초간 1.7배 가속
      else if (!h.spurt && Math.random() < 0.06 * dt) {
        h.spurt = true;
        h.stateTimer = 1.0;
        h.el.classList.add('spurt');
        beep(1200, .12, 'sine', .1);
        say(pick(COMMENTS.spurt(h.name)), 1.5);
      }

      // 스퍼트 지속시간 관리
      if (h.spurt) {
        h.stateTimer -= dt;
        if (h.stateTimer <= 0) { h.spurt = false; h.el.classList.remove('spurt'); }
      }

      // --- 속도 계산: 기본속도 × 랜덤 흔들림(0.6~1.4배) × 스퍼트 배수 ---
      const jitter = 0.6 + Math.random() * 0.8;
      const mult = h.spurt ? 1.7 : 1;
      h.progress += h.baseSpeed * jitter * mult * dt;

      // --- 흙먼지 이펙트 (0.15초마다 하나 생성) ---
      h.dustTimer -= dt;
      if (h.dustTimer <= 0) {
        h.dustTimer = 0.15;
        spawnDust(h);
      }

      // --- 결승선 통과 판정 ---
      if (h.progress >= 1) {
        h.progress = 1;
        h.state = 'finished';
        h.el.classList.remove('running','spurt');
        finishOrder.push(h);
        if (finishOrder.length === 1) {
          say(pick(COMMENTS.finish(h.name)), 3);
          beep(1046, .2); setTimeout(()=>beep(1318, .2), 200); setTimeout(()=>beep(1568, .4), 400); // 팡파레
        }
        const badge = h.el.querySelector('.rank-badge');
        badge.style.display = 'block';
        badge.textContent = ['🥇','🥈','🥉'][finishOrder.length-1] || finishOrder.length + '등';
      }
    }

    // --- 화면 위치 반영: progress(0~1)를 픽셀 좌표로 변환 ---
    const x = startX + (finishX - startX) * h.progress;
    h.el.style.transform = `translateX(${x}px)`;
  });

  // --- 접전 상황 중계: 1,2등 간격이 아주 좁으면 멘트 ---
  const running = horses.filter(h => h.state !== 'finished');
  if (finishOrder.length === 0 && running.length >= 2 && commentLock <= 0) {
    const sorted = [...horses].sort((a,b) => b.progress - a.progress);
    const gap = sorted[0].progress - sorted[1].progress;
    if (sorted[0].progress > 0.3) {
      if (gap < 0.02) say(pick(COMMENTS.close), 2.5);
      else if (gap > 0.08) say(pick(COMMENTS.lead(sorted[0].name)), 2.5);
    }
  }

  // --- 모든 말이 완주하면 결과 표시 ---
  if (finishOrder.length === horses.length) {
    raceRunning = false;
    setTimeout(showResult, 800);
    return;
  }
  requestAnimationFrame(loop);
}

// 흙먼지 DOM 생성 (0.6초 후 자동 삭제해 메모리 누수 방지)
function spawnDust(h) {
  const dust = document.createElement('span');
  dust.className = 'dust';
  dust.textContent = '💨';
  const rect = h.el.getBoundingClientRect();
  const laneRect = h.el.parentElement.getBoundingClientRect();
  dust.style.left = (rect.left - laneRect.left - 4) + 'px';
  dust.style.top = '22px';
  h.el.parentElement.appendChild(dust);
  setTimeout(() => dust.remove(), 600);
}

// 중계 멘트 표시 (lock: 해당 초 동안은 다른 멘트로 안 바뀜)
function say(text, lock = 1) {
  if (commentLock > 0 && lock < 2) return; // 중요 멘트(lock>=2)는 끼어들기 허용
  commentText.textContent = text;
  commentLock = lock;
}

// ================== 5. 결과 화면 ==================
function showResult() {
  resultEl.style.display = 'flex';
  $('winnerLine').textContent = `🏆 우승: ${finishOrder[0].name}!`;

  // 시상대 (2등-1등-3등 순서로 배치하는 것이 실제 시상대 모양)
  const podiumEl = $('podium');
  podiumEl.innerHTML = '';
  const order = [1, 0, 2]; // [2등, 1등, 3등]
  const cls = ['second','first','third'];
  const medals = ['🥈','🥇','🥉'];
  order.forEach((rankIdx, i) => {
    if (!finishOrder[rankIdx]) return; // 2마리 경주면 3등 칸 생략
    const step = document.createElement('div');
    step.className = 'step ' + cls[i];
    step.innerHTML = `<span class="h-emoji">🏇</span>${medals[i]}<span class="h-name">${finishOrder[rankIdx].name}</span>`;
    podiumEl.appendChild(step);
  });

  // 전체 순위표
  const listEl = $('rankList');
  listEl.innerHTML = finishOrder.map((h, i) =>
    `<div><span>${i+1}등</span><span style="color:${BADGE_COLORS[h.idx]};font-weight:700">${h.name}</span></div>`
  ).join('');

  launchConfetti();
}

// 색종이 40개를 화면 위에서 떨어뜨림
function launchConfetti() {
  const emojis = ['🎉','✨','🎊','⭐','💛'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const c = document.createElement('span');
      c.className = 'confetti';
      c.textContent = pick(emojis);
      c.style.left = Math.random() * 100 + 'vw';
      c.style.animationDuration = (2 + Math.random() * 2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4500);
    }, i * 60);
  }
}

// ================== 6. 다시하기 버튼들 ==================
$('againBtn').onclick = () => { resultEl.style.display = 'none'; setupRace(); };
$('newBtn').onclick = () => {
  resultEl.style.display = 'none';
  trackWrap.style.display = 'none';
  commentaryEl.style.display = 'none';
  setupEl.style.display = 'block';
};
</script>
